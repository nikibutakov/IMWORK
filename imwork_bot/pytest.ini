# ==================== Pytest Configuration for ImWork Bot ====================
# Конфигурация pytest для асинхронных тестов Telegram-бота
# Запуск: pytest tests/ -v --tb=short

[pytest]
# Автоматический режим asyncio
asyncio_mode = auto

# Маркеры для категоризации тестов
markers =
    onboarding: Tests for user onboarding flow
    student: Tests for student functionality
    employer: Tests for employer functionality
    career_center: Tests for career center materials
    edge_cases: Edge cases and error handling
    skip_mvp: Features not yet implemented in MVP

# Пути к тестам
testpaths = tests

# Паттерны имен файлов с тестами
python_files = test_*.py

# Паттерны имен функций с тестами
python_functions = test_*

# Вывод информации о тестах
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Фильтрация предупреждений
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
